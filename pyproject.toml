[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files   = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q -W ignore::UserWarning:django.core.handlers.base"
# Separate markers prevent accidental DB access in unit tests
markers = [
    "unit: pure-logic tests (no database)",
    "views: Django view tests (database, test client)",
    "e2e: Playwright end-to-end tests (live server + browser)",
]

# ── Ruff ──────────────────────────────────────────────────────────────────────

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "DJ",   # flake8-django
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
]
ignore = [
    "DJ001",  # nullable CharField – we always pair with blank=True
    "B008",   # function calls in default args (common Django pattern)
    "N806",   # variable names in functions (legacy)
    "ARG001", # unused function arguments (overrides, signals)
    "ARG002", # unused method arguments
]

[tool.ruff.lint.per-file-ignores]
"**/migrations/**" = ["E501", "N"]
"tests/**"         = ["ARG", "S101", "N802"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

# ── ty ────────────────────────────────────────────────────────────────────────

[tool.ty.environment]
python-version = "3.12"

[tool.ty.rules]
# Start strict but silence the noisiest Django-specific false-positives
unknown-argument    = "warn"
possibly-unbound    = "warn"
