repos:

  # ── Standard file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Ruff: lint + format ────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── ty: type checking ─────────────────────────────────────────────────────
  # ty doesn't publish pre-commit hooks yet, so we drive it via `uv run`
  # which picks up the exact version pinned in uv.lock.
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run --frozen ty check
        language: system
        types: [python]
        pass_filenames: false
        # .venv gives ty the Django/requests stubs for import resolution.
        # Skip migrations and tests — too much dynamism for ty at this stage.
        args: [--python, .venv, apps, config]
