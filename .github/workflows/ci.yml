name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DJANGO_SETTINGS_MODULE: config.settings
  DJANGO_SECRET_KEY: ci-test-secret-not-for-production
  DJANGO_DEBUG: "true"
  SILENCE_TOKEN_WARNINGS: "true"

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  # ── Unit tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/unit/ -v

  # ── View / functional tests (includes demo mode tests) ───────────────────
  views:
    name: View tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/views/ -v

  # ── Integration tests (mock Strava) ───────────────────────────────────────
  integration:
    name: Integration tests (mock Strava)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --dev
      - run: uv run pytest tests/integration/ -v

  # ── E2E tests (Playwright) ────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --dev
      - run: uv run playwright install --with-deps chromium
      - run: uv run pytest tests/e2e/ -v
